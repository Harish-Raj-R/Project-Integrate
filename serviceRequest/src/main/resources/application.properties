spring.application.name=servicerequest-service
server.port=8084
spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


# ============================================================
#  Local working configuration (feature/serviceRequest branch).
#  Do NOT commit real secrets to the shared main branch.
# ============================================================

# --- Database ---

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Keep names exactly as declared: table names are snake_case via @Table(name=...),
# column names stay camelCase as declared on the fields (no snake_case conversion).
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# All tables (including the placeholder cross-module ones) are created by Hibernate from
# the @Entity classes, and dummy rows are seeded by DummyDataSeeder — no schema.sql/data.sql.

# --- File uploads (Service Request documents) ---
civicdesk.uploads.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Server ---

# --- JWT Configuration ---
app.jwt.secret=civicdesk_hs256_secret_key_minimum_32_characters_required
app.jwt.expiry=1800000

# --- Notification Service Configuration ---
app.notification.base-url=http://localhost:8080/civicDesk/notificationsAlerts
