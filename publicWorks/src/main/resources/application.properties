spring.application.name=publicworks-service
server.port=8086
spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


# ============================================================
#  Shared configuration template (main branch).
#  Fill these in on your working branch / environment.
#  Do NOT commit real secrets to the shared main branch.
# ============================================================

# --- Database ---

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Keep column names exactly as declared (camelCase) instead of snake_case:
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- File Upload ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# --- Security ---
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# --- Server ---

# --- JWT Configuration ---
app.jwt.secret=civicdesk_hs256_secret_key_minimum_32_characters_required
app.jwt.expiry=1800000

# --- Notification Service Configuration ---
app.notification.base-url=http://localhost:8080/civicDesk/notificationsAlerts
