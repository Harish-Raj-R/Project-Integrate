# ============================================================
#  Test configuration — overrides src/main/resources for tests.
#  Runs against an in-memory H2 (MySQL compatibility mode) so the
#  full Spring/JPA stack can be exercised without a real MySQL.
# ============================================================

# --- Database (in-memory H2, MySQL-compatible) ---
spring.datasource.url=jdbc:h2:mem:civicdesk;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Keep identifiers exactly as declared (snake_case tables, camelCase columns), matching prod.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- File uploads (kept inside target/ so they are cleaned by mvn clean) ---
civicdesk.uploads.dir=./target/test-uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
