spring.application.name=citizen-service
server.port=8082
spring.datasource.url=jdbc:mysql://localhost:3306/civicdesk?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


# ============================================================
#  Shared configuration template (main branch).
#  Fill these in on your working branch / environment.
#  Do NOT commit real secrets to the shared main branch.
