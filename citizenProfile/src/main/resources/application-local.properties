# ============================================================================
#  LOCAL profile — Module 2.2 (citizen) Tier-2 Postman testing only.
#  Activate it when running the app:
#     .\mvnw.cmd spring-boot:run "-Dspring-boot.run.profiles=local"
#  Everything here is test-only and kept OUT of the shared application.properties
#  (which is the team template). Inherits the DB/JPA/server settings from it.
# ============================================================================

# --- Mock reference data: create + seed IAM's users/departments (see mock/*.sql) ---
# mode=always is required because MySQL is not an embedded DB (scripts are skipped otherwise).
# defer=true runs the scripts AFTER Hibernate creates the citizen tables, so ordering is safe.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:mock/schema-mock.sql
spring.sql.init.data-locations=classpath:mock/data-mock.sql
spring.jpa.defer-datasource-initialization=true

# --- Document upload (multipart) ---
# Keep the servlet cap ABOVE the service's 2 MB rule so DocumentService produces the precise
# "File exceeds the 2 MB limit" 400 for typical files; the cap is only a backstop for huge uploads.
# resolve-lazily=true makes an over-cap error surface inside the controller dispatch, so the
# module-scoped CitizenExceptionHandler can map it (otherwise it fires before handler mapping).
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true

# --- Document file storage (real bytes written to disk) ---
# storage-dir: where uploaded bytes are written (created on startup if missing).
# base-url: how a stored file is addressed for retrieval (served by GET /files/{name}); real port 8081.
citizen.document.storage-dir=./uploads
citizen.document.base-url=http://localhost:8082/civicDesk/citizenProfile/files
